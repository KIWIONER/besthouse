<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Best House Santiago</title>
    <!-- Content Security Policy: restricts resource origins to prevent XSS and data injection -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src https://fonts.gstatic.com;
      img-src 'self' https: data:;
      connect-src 'self' https://cerebro.agencialquimia.com https://ybqzcxabblyzqhezanaf.supabase.co;
      object-src 'none';
      base-uri 'self';
      form-action 'none';
    ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body class="dashboard-body">
    <!-- AdminAuth blocks access until valid credentials are entered.
         It removes itself from the DOM after a successful login. -->
    <script type="module" src="components/AdminAuth.js"></script>
    <admin-auth></admin-auth>

    <!-- The dashboard content is hidden until AdminAuth grants access -->
    <div id="app" style="display:none;" class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="dashboard-sidebar" id="sidebar">
            <!-- Botón blindado: estilo en línea y Z-index extremo para evitar bloqueos del inventario -->
            <button class="toggle-sidebar" id="toggleBtn" title="Contraer/Expandir menú" style="background: #ffda2a !important; border: 3px solid #000082 !important; border-radius: 50% !important; z-index: 99999 !important; width: 36px !important; height: 36px !important; display: flex !important; align-items: center !important; justify-content: center !important;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000082" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="pointer-events: none;"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="sidebar-content">
                <a href="/index.html" class="sidebar-logo">
                    <div class="logo-box">BH</div>
                    <div class="logo-text">
                        <span class="logo-title">Gestión</span>
                        <span class="logo-subtitle">Mando Editorial</span>
                    </div>
                </a>
                
                <nav class="sidebar-nav">
                    <button class="sidebar-item active" data-view="bulk">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg> <span>Importar Masivo</span>
                    </button>
                    <button class="sidebar-item" data-view="inventory">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> <span>Inventario</span>
                    </button>
                    <button class="sidebar-item" data-view="appointments">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> <span>Gestión de Citas</span>
                    </button>
                    <button class="sidebar-item" data-view="calendar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> <span>Calendario</span>
                    </button>
                </nav>

                <div class="sidebar-cta">
                    <button class="btn-new-property" onclick="switchView('manual')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span>Nueva Propiedad</span>
                    </button>
                </div>

                <div class="sidebar-footer">
                    <button class="sidebar-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        <span>Ajustes</span>
                    </button>
                    <button class="sidebar-item logout-btn" onclick="location.reload()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> <span>Cerrar Sesión</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="dashboard-content">
            <!-- Global Top Header -->
            <header class="top-nav">
                <div class="top-nav-info">
                    <!-- Espacio liberado por el buscador -->
                </div>
                <div class="top-nav-actions">
                    <button class="nav-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
                    <button class="nav-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></button>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name">Admin Best House</span>
                            <span class="user-role">SENIOR MANAGER</span>
                        </div>
                        <div class="user-avatar">
                            <img src="https://i.pravatar.cc/100?u=bh_admin" alt="Admin Avatar">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Breadcrumbs / Secondary Header -->
            <div class="content-header">
                <nav class="breadcrumbs">
                    <a href="#" onclick="switchView('inventory')" style="text-decoration:none; color:inherit; cursor:pointer;" id="bread-root">Lista de propiedades</a>
                    <span class="separator">/</span>
                    <span class="active" id="bread-active">INVENTARIO</span>
                </nav>
                <div class="header-actions">
                    <h1 id="view-title">Listado de Propiedades</h1>
                    <div class="action-buttons">
                        <button class="btn-secondary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg> Filtros Avanzados</button>
                        <button class="btn-primary" onclick="switchView('manual')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Nueva Propiedad</button>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <section class="dashboard-view active" id="view-bulk">
                    <div class="upload-section">
                        <div class="glass-panel">
                            <dashboard-upload id="property-uploader"></dashboard-upload>
                        </div>
                    </div>
                </section>

                <section class="dashboard-view" id="view-manual">
                    <div class="form-section">
                        <property-form id="property-manual-form"></property-form>
                    </div>
                </section>

                <section class="dashboard-view" id="view-inventory">
                    <div class="inventory-section">
                        <inventory-list id="property-inventory"></inventory-list>
                    </div>
                </section>

                <section class="dashboard-view" id="view-appointments">
                    <div class="appointments-section">
                        <appointment-list id="property-appointments"></appointment-list>
                    </div>
                </section>

                <section class="dashboard-view" id="view-calendar">
                    <div class="calendar-section">
                        <calendar-view id="admin-calendar"></calendar-view>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="main.js"></script>
    <script type="module" src="components/DashboardUpload.js"></script>
    <script type="module" src="components/PropertyForm.js"></script>
    <script type="module" src="components/InventoryList.js"></script>
    <script type="module" src="components/CalendarView.js"></script>
    <script type="module" src="components/AppointmentList.js"></script>

    <script>
        // Lógica de navegación centralizada
        window.switchView = function(view) {
            // Actualizar selección visual en sidebar
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            const activeSidebarItem = document.querySelector(`.sidebar-item[data-view="${view}"]`);
            if (activeSidebarItem) activeSidebarItem.classList.add('active');

            // Actualizar Título y Breadcrumbs dinámicamente
            const titleMap = {
                'bulk': 'Importación de Activos',
                'manual': 'Nueva Propiedad / Edición',
                'inventory': 'Listado de Propiedades',
                'appointments': 'Gestión de Citas y Leads',
                'calendar': 'Agenda de Visitas'
            };
            const viewTitle = document.getElementById('view-title');
            if (viewTitle) viewTitle.textContent = titleMap[view] || 'Panel de Gestión';
            
            const breadActive = document.getElementById('bread-active');
            if (breadActive) {
                if (view === 'inventory') {
                    breadActive.textContent = 'INVENTARIO';
                } else if (view === 'manual') {
                    breadActive.textContent = 'NUEVA PROPIEDAD';
                } else {
                    breadActive.textContent = view.toUpperCase();
                }
            }

            // Cambiar vista
            document.querySelectorAll('.dashboard-view').forEach(v => v.classList.remove('active'));
            const targetView = document.getElementById(`view-${view}`);
            if (targetView) targetView.classList.add('active');

            // Recargas específicas
            if (view === 'inventory') {
                const invList = document.getElementById('property-inventory');
                if (invList && typeof invList.loadData === 'function') invList.loadData();
            } else if (view === 'appointments') {
                const appList = document.getElementById('property-appointments');
                if (appList && typeof appList.loadData === 'function') appList.loadData();
            } else if (view === 'calendar') {
                const calendar = document.getElementById('admin-calendar');
                if (calendar && typeof calendar.loadData === 'function') calendar.loadData();
            }
        };

        // Escuchar solicitud de edición desde el inventario
        window.addEventListener('edit-property', (e) => {
            const propertyData = e.detail;
            console.log('[Dashboard] Transitioning to EDIT mode for:', propertyData.referencia);
            
            // 1. Cambiar a la vista de formulario
            switchView('manual');
            
            // 2. Inyectar los datos en el componente del formulario
            const form = document.getElementById('property-manual-form');
            if (form && typeof form.setEditData === 'function') {
                form.setEditData(propertyData);
                // 3. Actualizar migas de pan con la referencia
                const breadActive = document.getElementById('bread-active');
                if (breadActive) breadActive.textContent = `REF: ${propertyData.referencia}`;
            } else {
                console.error('[Dashboard Error] El componente property-form no está listo o no tiene la función setEditData.', form);
            }
        });

        // Asignar eventos a los items actuales del sidebar
        document.querySelectorAll('.sidebar-item[data-view]').forEach(button => {
            button.addEventListener('click', () => {
                switchView(button.getAttribute('data-view'));
            });
        });

        // Toggle Sidebar manual
        const toggleBtn = document.getElementById('toggleBtn');
        const appWrapper = document.getElementById('app');
        
        // Recuperar preferencia
        if (localStorage.getItem('sidebar_collapsed') === 'true') {
            appWrapper.classList.add('collapsed');
        }


        // Toggle Sidebar manual con lógica explícita
        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const isCollapsed = appWrapper.classList.contains('collapsed');
            
            if (isCollapsed) {
                console.log('[Dashboard] Expanding sidebar...');
                appWrapper.classList.remove('collapsed');
                localStorage.setItem('sidebar_collapsed', 'false');
            } else {
                console.log('[Dashboard] Collapsing sidebar...');
                appWrapper.classList.add('collapsed');
                localStorage.setItem('sidebar_collapsed', 'true');
            }
        });
    </script>
</body>
</html>
